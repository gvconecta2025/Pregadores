<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App para Pregadores - Beta V9 (Dark Mode)</title>
    <style>
        /* PALETA DARK MODE MODERNA */
        :root {
            --bg-color: #0f172a;       /* Fundo da Tela */
            --card-bg: #1e293b;        /* Fundo do Bloco */
            --text-main: #f8fafc;      /* Texto Branco/Gelo */
            --text-muted: #94a3b8;     /* Texto Secundário Cinza */
            --primary: #4f46e5;        /* Azul Indigo */
            --primary-hover: #4338ca;  
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border-light: #334155;   /* Bordas Escuras */
            --main-header-height: 70px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* -------------------------------------------
           TELA DE LOGIN
        ------------------------------------------- */
        #auth-screen {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 20px; box-sizing: border-box;
        }

        .auth-card {
            background: var(--card-bg); padding: 40px 30px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border-light);
        }

        .auth-card h2 { color: var(--text-main); margin-top: 0; margin-bottom: 25px; font-weight: 800; font-size: 1.5rem; }
        
        .auth-input {
            width: 100%; padding: 14px 15px; margin-bottom: 15px; background: #0f172a; color: var(--text-main);
            border: 1px solid var(--border-light); border-radius: 8px; font-size: 1rem; box-sizing: border-box; outline: none;
        }
        .auth-input:focus { border-color: var(--primary); }
        .auth-input::placeholder { color: var(--text-muted); }

        .auth-btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        .btn-login { background-color: var(--primary); color: white; }
        .btn-register { background-color: transparent; color: var(--primary); border: 2px solid var(--primary); }
        .error-msg { color: var(--danger); font-size: 0.9rem; margin-bottom: 15px; min-height: 20px; font-weight: 600; }

        #main-header, #app-container { display: none; }

        /* -------------------------------------------
           CABEÇALHO PRINCIPAL
        ------------------------------------------- */
        .main-header {
            background-color: var(--bg-color); height: var(--main-header-height); padding: 0 20px; display: flex;
            justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border-light); box-sizing: border-box;
        }

        .header-title-group { display: flex; align-items: center; gap: 15px; }
        .main-header h1 { margin: 0; font-size: 1.3rem; color: var(--text-main); font-weight: 800; letter-spacing: -0.5px; }

        .global-timer {
            background-color: var(--card-bg); color: var(--success); padding: 6px 12px;
            border-radius: 6px; font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; gap: 6px; font-family: monospace; border: 1px solid var(--border-light);
        }

        .header-actions { display: flex; gap: 10px; }
        .btn-toggle-mode { background-color: var(--success); color: white; border: none; padding: 8px 16px; border-radius: 99px; font-weight: 600; font-size: 0.875rem; cursor: pointer; }
        .btn-toggle-mode.locked { background-color: var(--card-bg); color: var(--text-muted); border: 1px solid var(--border-light); }
        .btn-logout { background-color: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 8px 16px; border-radius: 99px; font-weight: 600; font-size: 0.875rem; cursor: pointer; }

        .container { width: 100%; margin: 0 auto; box-sizing: border-box; }
        #blocks-wrapper { display: flex; flex-direction: column; }

        /* CABEÇAS (Títulos) */
        .accordion-header {
            background-color: var(--primary); color: white; display: flex; align-items: center; padding: 18px 20px; cursor: pointer;
            border-radius: 12px; margin-bottom: 12px; transition: border-radius 0.2s ease, margin 0.2s ease; position: relative;
        }
        .accordion-header.sticky-top { position: sticky; top: var(--main-header-height); z-index: 90; border-radius: 12px 12px 0 0; margin-bottom: 0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        .accordion-header.sticky-bottom { position: sticky; bottom: 0; z-index: 80; box-shadow: 0 -10px 15px -3px rgba(0,0,0,0.5); }

        .progress-bar-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(0,0,0,0.2); border-radius: 0 0 12px 12px; overflow: hidden; pointer-events: none; }
        .accordion-header.sticky-top .progress-bar-container { border-radius: 0; }
        .progress-bar-fill { height: 100%; width: 0%; background-color: var(--success); transition: width 1s linear, background-color 0.5s ease; }

        .header-content { flex-grow: 1; font-size: 1.2rem; font-weight: 700; color: white; outline: none; min-height: 28px; white-space: pre-wrap; word-break: break-word; }
        .header-content:empty:before { content: "Digite o tópico aqui..."; color: rgba(255, 255, 255, 0.5); font-weight: 500; }

        .header-timer {
            display: flex; align-items: center; background: rgba(0, 0, 0, 0.2); padding: 6px 12px; border-radius: 99px; font-size: 1rem; margin-right: 12px;
            font-family: monospace; font-weight: 700; cursor: pointer; border: 1px solid transparent;
        }
        .header-timer.paused { animation: pulse-pause 1.5s infinite; background: rgba(0, 0, 0, 0.4); }
