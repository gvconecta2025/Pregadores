<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pregadores - App V15.0</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a" id="theme-color-meta">
    <link rel="apple-touch-icon" href="/icon192c.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* PALETA PREMIUM DARK (PADRÃO) */
        :root {
            --bg-gradient: radial-gradient(circle at 10% 0%, #1e1b4b 0%, #020617 100%);
            --glass-bg: rgba(30, 41, 59, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-glow: rgba(99, 102, 241, 0.5);
            --primary: #6366f1; 
            --primary-hover: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --main-header-height: 75px;
            --input-bg: rgba(0,0,0,0.2);
            --btn-text-color: white;
        }

        /* PALETA MODO CLARO */
        :root.light-mode {
            --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.15);
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent-glow: rgba(79, 70, 229, 0.3);
            --primary: #4f46e5;
            --input-bg: rgba(255,255,255,0.8);
            --btn-text-color: #ffffff;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-gradient); background-attachment: fixed; color: var(--text-main); margin: 0; padding: 0; line-height: 1.6; min-height: 100vh; overflow-x: hidden; transition: background 0.3s ease, color 0.3s ease;}
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; }

        /* TELA DE LOGIN */
        #auth-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .auth-card { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); padding: 50px 40px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 420px; text-align: center; border: 1px solid var(--glass-border); }
        .auth-card h2 { color: var(--text-main); margin-top: 0; margin-bottom: 30px; font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px;}
        .auth-input { width: 100%; padding: 16px 20px; background: var(--input-bg); color: var(--text-main); border: 1px solid var(--glass-border); border-radius: 12px; font-size: 1.05rem; box-sizing: border-box; outline: none; transition: all 0.3s ease; }
        .auth-input:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--accent-glow); }
        .password-wrapper { position: relative; margin-bottom: 20px; }
        .password-wrapper .auth-input { margin-bottom: 0; padding-right: 50px; }
        .btn-toggle-pwd { position: absolute; right: 15px; top: 15px; background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;}
        .btn-toggle-pwd:hover { color: var(--text-main); }
        .btn-forgot-pwd { display: block; text-align: right; color: var(--primary); font-size: 0.9rem; font-weight: 600; text-decoration: none; margin-top: -10px; margin-bottom: 20px; transition: color 0.2s;}
        .btn-forgot-pwd:hover { color: var(--primary-hover); text-decoration: underline; }
        .auth-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-bottom: 12px; transition: all 0.3s ease; }
        .btn-login { background-color: var(--primary); color: var(--btn-text-color); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
        .btn-login:hover { background-color: var(--primary-hover); transform: translateY(-2px); }
        .btn-register { background-color: transparent; color: var(--text-main); border: 1px solid var(--glass-border); }
        .btn-register:hover { background: rgba(128,128,128,0.1); }
        .error-msg { color: #fca5a5; font-size: 0.95rem; margin-bottom: 20px; min-height: 20px; font-weight: 500; }

        #main-header, #app-container { display: none; }

        /* MENU LATERAL (SIDEBAR) */
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); z-index: 199; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .sidebar-overlay.show { opacity: 1; pointer-events: auto; }
        .sidebar { position: fixed; top: 0; left: -320px; width: 320px; height: 100vh; background: var(--bg-gradient); backdrop-filter: blur(20px); border-right: 1px solid var(--glass-border); z-index: 200; display: flex; flex-direction: column; box-shadow: 10px 0 40px rgba(0,0,0,0.7); transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar.open { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 24px; border-bottom: 1px solid var(--glass-border); }
        .sidebar-header h2 { margin: 0; font-size: 1.2rem; color: var(--text-main); font-weight: 700; letter-spacing: -0.5px;}
        .sidebar-body { padding: 24px; flex-grow: 1; overflow-y: auto; }
        .btn-install-pwa { width: 100%; padding: 14px; background: var(--success); color: white; border: none; border-radius: 12px; display: none; align-items: center; justify-content: center; gap: 10px; font-size: 1.05rem; font-weight: 700; cursor: pointer; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); animation: pulse 2s infinite;}
        .btn-new-sermon { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.05rem; font-weight: 700; cursor: pointer; margin-bottom: 30px; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        .sermon-list-title { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 15px; display: block; }
        .sermon-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
        .sermon-item { padding: 14px 16px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--text-muted); font-weight: 500; transition: all 0.2s; border: 1px solid transparent; font-size: 0.95rem; }
        .sermon-item:hover { background: rgba(128,128,128,0.1); color: var(--text-main); }
        .sermon-item.active { background: rgba(99, 102, 241, 0.15); color: var(--primary); border-color: rgba(99, 102, 241, 0.3); font-weight: 600; }

        /* CABEÇALHO PRINCIPAL E DROPDOWN */
        .main-header { background: var(--glass-bg); backdrop-filter: blur(20px); height: var(--main-header-height); padding: 0 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--glass-border); box-sizing: border-box; }
        .header-title-group { display: flex; align-items: center; gap: 15px; }
        .btn-hamburger { background: transparent; color: var(--text-main); border: 1px solid var(--glass-border); padding: 8px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-hamburger:hover { background: rgba(128,128,128,0.1); }
        .main-header h1 { margin: 0; font-size: 1.4rem; color: var(--text-main); font-weight: 800; letter-spacing: -0.5px; white-space: nowrap;}
        
        /* Relógio e Tempo Geral */
        .header-clock { background: rgba(128,128,128,0.1); color: var(--text-main); padding: 8px 16px; border-radius: 99px; font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; border: 1px solid var(--glass-border); }
        .global-timer { background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 8px 16px; border-radius: 99px; font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 0 10px rgba(16, 185, 129, 0.1); }
        .global-timer span.text-restam { display: inline; }
        
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .btn-action-icon { background: transparent; color: var(--text-main); border: 1px solid var(--glass-border); padding: 10px; border-radius: 50%; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-action-icon:hover { background: rgba(128,128,128,0.1); }

        /* Ocultar Cronômetros no Modo Leitura */
        body.hide-timers .timer-panel, body.hide-timers .global-timer { display: none !important; }
        
        #btnToggleTimers { display: none; } /* Só aparece no modo leitura */
        body.view-mode #btnToggleTimers { display: flex; }

        .btn-toggle-mode { background-color: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 99px; font-weight: 600; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s; }
        .btn-toggle-mode.locked { background-color: transparent; color: var(--text-muted); border: 1px solid var(--glass-border); }
        
        .user-menu-wrapper { position: relative; display: flex; align-items: center; justify-content: center;}
        .user-avatar-btn { padding: 0; overflow: hidden; border-color: var(--primary); background: transparent; cursor: pointer; border-radius: 50%; border: 2px solid var(--primary);}
        .user-dropdown { display: none; position: absolute; top: calc(100% + 15px); right: 0; background: var(--bg-gradient); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); width: 260px; overflow: hidden; z-index: 200; animation: fadeIn 0.2s ease; }
        .user-dropdown.show { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .user-dropdown-header { padding: 20px; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 15px; background: rgba(128,128,128,0.05); }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%); color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.3rem; flex-shrink: 0; }
        .user-info { display: flex; flex-direction: column; overflow: hidden; }
        .user-title { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 2px;}
        .user-email { font-size: 0.95rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
        .user-dropdown-body { padding: 10px; }
        .dropdown-item { width: 100%; text-align: left; padding: 12px 15px; background: transparent; border: none; border-radius: 10px; color: var(--text-muted); font-size: 0.95rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.2s; }
        .dropdown-item:hover { background: rgba(128,128,128,0.1); color: var(--text-main); }
        .dropdown-item.text-danger { color: #fca5a5; margin-top: 5px;}
        .dropdown-item.text-danger:hover { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        .container { width: 100%; margin: 0 auto; box-sizing: border-box; padding-top: 20px; }
        .sermon-main-title { width: 100%; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--text-main); font-size: 2.2rem; font-weight: 800; margin-bottom: 25px; padding: 10px 0; outline: none; letter-spacing: -1px; transition: border-color 0.3s; font-family: 'Inter', sans-serif; }
        .sermon-main-title:focus { border-bottom-color: var(--primary); }
        .sermon-main-title::placeholder { color: var(--text-muted); opacity: 0.5; }

        /* ESTRUTURA DOS BLOCOS */
        #blocks-wrapper { display: block; }
        .accordion-item { position: relative; } 

        .accordion-header { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 20px; display: flex; align-items: center; padding: 20px 24px; cursor: pointer; position: relative; margin-bottom: 20px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .accordion-header.active { border-color: rgba(99, 102, 241, 0.4); border-bottom: 1px solid transparent; border-radius: 20px 20px 0 0; margin-bottom: 0; background: var(--bg-gradient); box-shadow: 0 -10px 30px rgba(99, 102, 241, 0.15); }
        
        /* TELA ÚTIL (Sticky Top e Sticky Bottom) */
        .accordion-header.sticky-top { position: -webkit-sticky; position: sticky; top: var(--main-header-height); z-index: 90; }
        /* A cabeça seguinte fica colada no rodapé */
        .accordion-header.sticky-bottom { position: -webkit-sticky; position: sticky; bottom: 0; z-index: 80; border-radius: 20px 20px 0 0; margin-bottom: 0; box-shadow: 0 -15px 30px rgba(0,0,0,0.3); background: var(--bg-gradient); }

        .accordion-body { display: none; padding: 0 24px 24px 24px; background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid rgba(99, 102, 241, 0.4); border-top: none; border-radius: 0 0 20px 20px; margin-bottom: 20px; box-shadow: 0 20px 30px rgba(99, 102, 241, 0.15); }
        .accordion-body.active { display: block; animation: slideDown 0.4s ease; min-height: calc(100vh - 160px); }

        .progress-bar-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 8px; background: rgba(128,128,128,0.2); border-radius: 0 0 20px 20px; overflow: hidden; }
        .accordion-header.active .progress-bar-container { border-radius: 0; }
        .accordion-header.sticky-bottom .progress-bar-container { display: none; } 
        .progress-bar-fill { height: 100%; width: 0%; background-color: var(--primary); transition: width 1s linear, background-color 0.5s ease; box-shadow: 0 0 10px var(--primary); }

        .header-content { flex-grow: 1; font-size: 1.3rem; font-weight: 700; color: var(--text-main); outline: none; min-height: 32px; white-space: pre-wrap; word-break: break-word; }
        .header-content:empty:before { content: "Digite o tópico aqui..."; color: var(--text-muted); opacity: 0.5; font-weight: 500; }

        .timer-panel { display: flex; align-items: center; gap: 8px; background: var(--input-bg); padding: 6px; border-radius: 99px; margin-right: 15px; border: 1px solid var(--glass-border); }
        .header-timer { font-size: 1.1rem; font-family: monospace; font-weight: 700; padding: 0 10px; color: var(--text-main); }
        .header-timer.over-time { color: #fca5a5; text-shadow: 0 0 10px var(--danger); animation: pulse 2s infinite; }
        .timer-btn { background: transparent; color: var(--text-muted); border: none; display: flex; align-items: center; justify-content: center; padding: 6px; border-radius: 50%; cursor: pointer; transition: all 0.2s; }
        .timer-btn:hover { background: rgba(128,128,128,0.2); color: var(--text-main); }
        .timer-btn.active-play { color: var(--success); }
        .timer-btn.active-pause { color: var(--warning); animation: pulse 1.5s infinite; }
        .toggle-icon { display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: transform 0.4s ease; }
        .accordion-header.active .toggle-icon { transform: rotate(180deg); color: var(--primary); }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .time-settings { background: var(--input-bg); padding: 15px 20px; border-radius: 12px; margin-top: 15px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--glass-border); }
        .time-settings label { font-weight: 600; color: var(--text-muted); font-size: 0.95rem; display: flex; align-items: center; gap: 8px;}
        .time-settings input { width: 80px; padding: 8px; background: rgba(128,128,128,0.1); color: var(--text-main); border: 1px solid var(--glass-border); border-radius: 8px; font-size: 1.1rem; text-align: center; outline: none; }
        .time-settings input:focus { border-color: var(--primary); }

        .toolbar { display: flex; gap: 6px; padding: 12px; background: var(--input-bg); border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--glass-border); flex-wrap: wrap;}
        .toolbar button { background: transparent; border: none; padding: 8px; border-radius: 8px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .toolbar button:hover { background: rgba(128,128,128,0.2); color: var(--text-main); }
        .toolbar .divider { width: 1px; background-color: var(--glass-border); margin: 0 6px; }
        
        .format-select { background: rgba(128,128,128,0.1); color: var(--text-main); border: 1px solid var(--glass-border); border-radius: 8px; padding: 6px; outline: none; font-size: 0.9rem; cursor: pointer; }
        .format-select option { background: #0f172a; color: white; }
        body.light-mode .format-select option { background: white; color: black; }

        .editor-area { outline: none; line-height: 1.8; font-size: 1.2rem; color: var(--text-main); padding: 10px 0; min-height: 200px; }
        .editor-area:empty:before { content: "Desenvolva o seu raciocínio aqui..."; color: var(--text-muted); opacity: 0.5; }

        .box-actions { display: flex; justify-content: flex-end; gap: 15px; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--glass-border); }
        .btn-action { padding: 12px 24px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s;}
        .btn-save { background-color: var(--primary); color: white; }
        .btn-save:hover { background-color: var(--primary-hover); box-shadow: 0 0 15px var(--accent-glow); }
        .btn-delete { background-color: transparent; color: #fca5a5; }
        .btn-delete:hover { background: rgba(239, 68, 68, 0.1); }

        .btn-add { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 24px; background: var(--glass-bg); color: var(--text-muted); border: 1px dashed var(--glass-border); border-radius: 20px; font-size: 1.15rem; font-weight: 600; cursor: pointer; margin-top: 10px; margin-bottom: 80px; transition: all 0.3s; }
        .btn-add:hover { background: rgba(128,128,128,0.1); border-color: var(--primary); color: var(--text-main); box-shadow: 0 0 20px rgba(99,102,241,0.1); }

        /* REGRAS DO MODO LEITURA */
        body.view-mode .toolbar, body.view-mode .box-actions, body.view-mode .btn-add, body.view-mode .time-settings { display: none !important; }
        body.view-mode .sermon-main-title { pointer-events: none; border-bottom-color: transparent; }
        body.view-mode .sermon-main-title::placeholder { color: transparent; }
        body.view-mode .accordion-body { border: none !important; background: transparent !important; box-shadow: none !important; padding-top: 10px; }
        body.view-mode .accordion-header.active { border-color: transparent !important; box-shadow: none !important; background: transparent !important; }
        body.view-mode .accordion-item { border-color: transparent !important; background: transparent !important; }

        /* RESPONSIVIDADE MOBILE */
        @media (max-width: 767px) {
            .container { padding: 10px; max-width: 100%; }
            .toolbar { overflow-x: auto; flex-wrap: nowrap; }
            .toolbar::-webkit-scrollbar { display: none; }
            
            .main-header { padding: 0 15px; }
            .main-header h1 { display: none; }
            .header-title-group { gap: 8px; }
            
            .global-timer span.text-restam, .header-clock span.text-hora { display: none; }
            .global-timer, .header-clock { padding: 6px 12px; font-size: 0.95rem;}
            
            .header-actions { gap: 8px; }
            .btn-toggle-mode .mode-text { display: none; }
            .btn-toggle-mode { padding: 10px; border-radius: 50%; justify-content: center; width: 44px; height: 44px; }
            .btn-action-icon { padding: 8px; width: 40px; height: 40px;}
            .user-avatar-btn { width: 44px; height: 44px; }
            .user-avatar { width: 40px; height: 40px; font-size: 1.2rem; }
            
            .accordion-header { flex-wrap: wrap; padding: 20px 15px; }
            .header-content { width: calc(100% - 30px); margin-bottom: 15px; font-size: 1.2rem; }
            .toggle-icon { position: absolute; right: 20px; top: 24px; }
            .timer-panel { width: 100%; margin-right: 0; justify-content: space-between; padding: 8px 15px; box-sizing: border-box; }
            .sermon-main-title { font-size: 1.8rem; padding: 0 10px; }
        }
        @media (min-width: 768px) and (max-width: 1023px) { .container { padding: 30px; max-width: 90%; } }
        @media (min-width: 1024px) { .container { padding: 40px; max-width: 75%; } .toolbar { position: sticky; top: calc(var(--main-header-height) + 80px); z-index: 85; background: var(--bg-gradient); backdrop-filter: blur(10px); } }
    </style>
</head>
<body class="edit-mode">

    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>Os Meus Esboços</h2>
            <button id="btnCloseSidebar" class="btn-action-icon" title="Fechar Menu"><i data-lucide="x" style="width: 20px;"></i></button>
        </div>
        <div class="sidebar-body">
            <button id="btnInstallPwa" class="btn-install-pwa">
                <i data-lucide="download"></i> Instalar App Pregadores
            </button>
            <button class="btn-new-sermon" onclick="window.startNewSermon()">
                <i data-lucide="plus"></i> Novo Esboço
            </button>
            <span class="sermon-list-title">Guardados no Aparelho</span>
            <ul class="sermon-list" id="dynamic-sermon-list">
                <li class="sermon-item" style="opacity: 0.5;">A carregar esboços...</li>
            </ul>
        </div>
    </aside>

    <div id="auth-screen">
        <div class="auth-card">
            <i data-lucide="book-open" style="color: var(--primary); width: 48px; height: 48px; margin-bottom: 20px;"></i>
            <h2>Pregadores</h2>
            <div id="auth-error" class="error-msg"></div>
            <input type="email" id="email" class="auth-input" placeholder="O seu E-mail" required>
            <div class="password-wrapper">
                <input type="password" id="password" class="auth-input" placeholder="A sua Senha (mín. 6 caracteres)" required>
                <button type="button" id="btnTogglePwd" class="btn-toggle-pwd" title="Mostrar/Ocultar Senha">
                    <i data-lucide="eye" id="eye-show"></i>
                    <i data-lucide="eye-off" id="eye-hide" style="display: none;"></i>
                </button>
            </div>
            <a href="#" id="btnForgotPassword" class="btn-forgot-pwd">Esqueceu a senha?</a>
            <button id="btnLogin" class="auth-btn btn-login">Acessar</button>

    <div class="container" id="app-container">
        <input type="text" id="sermon-title" class="sermon-main-title" placeholder="Dê um título à sua pregação..." />
        
        <div id="blocks-wrapper">
            </div>
        <button class="btn-add" onclick="window.addNewBlock()"><i data-lucide="plus-circle"></i> Adicionar Novo Tópico</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, enableIndexedDbPersistence, collection, doc, setDoc, getDocs, addDoc, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDthpfYhfEWo_owFkHEPBd8ThKuPGstUoY",
            authDomain: "pregadores-6c330.firebaseapp.com",
            projectId: "pregadores-6c330",
            storageBucket: "pregadores-6c330.firebasestorage.app",
            messagingSenderId: "918085682020",
            appId: "1:918085682020:web:fe7861fe330068d1a73071",
            measurementId: "G-FZLWTMHQ83"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        enableIndexedDbPersistence(db).catch((err) => console.log("Persistência offline padrão falhou:", err.code));

        let currentUser = null;
        let currentSermonId = null;

        const authScreen = document.getElementById('auth-screen');
        const mainHeader = document.getElementById('main-header');
        const appContainer = document.getElementById('app-container');
        const errorMsg = document.getElementById('auth-error');
        
        // --- FUNÇÕES OFFLINE LOCALSTORAGE ---
        window.getLocalKey = () => `pregadores_sermons_${currentUser ? currentUser.uid : 'guest'}`;
        
        window.getSermonsLocal = () => {
            return JSON.parse(localStorage.getItem(window.getLocalKey()) || '{}');
        };

        window.saveSermonLocal = (id, data) => {
            const all = window.getSermonsLocal();
            all[id] = data;
            localStorage.setItem(window.getLocalKey(), JSON.stringify(all));
        };
        // -------------------------------------

        document.getElementById('btnTogglePwd').addEventListener('click', function() {
            const pwdInput = document.getElementById('password');
            if (pwdInput.type === 'password') { pwdInput.type = 'text'; document.getElementById('eye-show').style.display = 'none'; document.getElementById('eye-hide').style.display = 'block'; } 
            else { pwdInput.type = 'password'; document.getElementById('eye-show').style.display = 'block'; document.getElementById('eye-hide').style.display = 'none'; }
        });

        document.getElementById('btnForgotPassword').addEventListener('click', (e) => {
            e.preventDefault(); const email = document.getElementById('email').value.trim();
            if(!email) { errorMsg.style.color = "var(--warning)"; errorMsg.innerText = "Por favor, digite o seu e-mail acima e clique em esqueci a senha novamente."; return; }
            sendPasswordResetEmail(auth, email).then(() => { errorMsg.style.color = "var(--success)"; errorMsg.innerText = "E-mail de recuperação enviado! Verifique a sua caixa de correio."; }).catch(() => { errorMsg.style.color = "#fca5a5"; errorMsg.innerText = "Erro ao enviar e-mail. Verifique se o e-mail está correto."; });
        });

        window.renderSermonListUI = function(sermonsObj) {
            const sermonListEl = document.getElementById('dynamic-sermon-list');
            sermonListEl.innerHTML = '';
            const keys = Object.keys(sermonsObj);
            
            if (keys.length === 0) { 
                sermonListEl.innerHTML = '<li class="sermon-item" style="opacity: 0.5;">Nenhum esboço guardado.</li>'; 
                return; 
            }

            // Ordena os mais recentes primeiro (baseado no timestamp local)
            keys.sort((a, b) => (sermonsObj[b].localUpdatedAt || 0) - (sermonsObj[a].localUpdatedAt || 0)).forEach(id => {
                const data = sermonsObj[id];
                const li = document.createElement('li');
                li.className = `sermon-item ${id === currentSermonId ? 'active' : ''}`;
                li.innerHTML = `<i data-lucide="file-text" style="width: 18px;"></i> ${data.title || 'Sem Título'}`;
                li.onclick = () => window.loadSingleSermon(id, data);
                sermonListEl.appendChild(li);
            });
            lucide.createIcons();
        };

        window.loadSermonsList = async function() {
            if (!currentUser) return;
            
            // 1. Carrega imediatamente do LocalStorage (Aparelho Offline)
            const localSermons = window.getSermonsLocal();
            window.renderSermonListUI(localSermons);
            
            // 2. Tenta sincronizar com o Firebase em background
            try {
                const sermonsColl = collection(db, "users", currentUser.uid, "sermons");
                const snapshot = await getDocs(query(sermonsColl));
                let hasUpdates = false;
                
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    if (!localSermons[docSnap.id] || (data.updatedAt && localSermons[docSnap.id].updatedAt !== data.updatedAt.toMillis())) {
                        localSermons[docSnap.id] = {...data, localUpdatedAt: data.updatedAt ? data.updatedAt.toMillis() : Date.now()};
                        hasUpdates = true;
                    }
                });
                
                if (hasUpdates) {
                    localStorage.setItem(window.getLocalKey(), JSON.stringify(localSermons));
                    window.renderSermonListUI(localSermons);
                }
            } catch(e) { console.log("Modo Offline Ativo. Usando apenas dados do aparelho."); }
        };

        window.saveCurrentSermon = async function(btnElement = null, isAutoSave = false) {
            if (!currentUser) return;
            let originalText = "";
            
            if (btnElement && !isAutoSave) { 
                originalText = btnElement.innerHTML; 
                btnElement.innerHTML = '<i data-lucide="loader" class="spin" style="width:18px;"></i> Guardando...'; 
                lucide.createIcons(); 
            }

            const blocks = [];
            document.querySelectorAll('.accordion-item').forEach(item => {
                const header = item.querySelector('.header-content').innerText;
                const estimated = item.querySelector('.accordion-header').getAttribute('data-estimated');
                const content = item.querySelector('.editor-area').innerHTML;
                blocks.push({ header, estimated, content });
            });
            
            const sermonTitle = document.getElementById('sermon-title').value.trim() || "Esboço Sem Título";
            const now = Date.now();
            const sermonData = { title: sermonTitle, blocks: blocks, localUpdatedAt: now };
            
            // Gerar ID local se não existir
            if (!currentSermonId) { currentSermonId = 'local_' + now; }

            // 1. Salva Imediatamente no Aparelho (LocalStorage)
            window.saveSermonLocal(currentSermonId, sermonData);

            // UI de Sucesso Imediato
            if (btnElement && !isAutoSave) { 
                btnElement.innerHTML = '<i data-lucide="check" style="width:18px;"></i> Guardado no Aparelho!'; 
                btnElement.style.backgroundColor = 'var(--success)'; lucide.createIcons(); 
                setTimeout(() => { btnElement.innerHTML = originalText; btnElement.style.backgroundColor = 'var(--primary)'; lucide.createIcons(); }, 2000); 
            }
            window.loadSermonsList();

            // 2. Tenta salvar na nuvem Firebase (Silencioso)
            try {
                const userRef = doc(db, "users", currentUser.uid);
                const sermonsColl = collection(userRef, "sermons");
                const fireData = { ...sermonData, updatedAt: serverTimestamp() };
                
                if (currentSermonId.startsWith('local_')) { 
                    const docRef = await addDoc(sermonsColl, fireData); 
                    // Se salvou no Firebase, atualiza o ID local para o ID da nuvem
                    const allLocal = window.getSermonsLocal();
                    allLocal[docRef.id] = allLocal[currentSermonId];
                    delete allLocal[currentSermonId];
                    localStorage.setItem(window.getLocalKey(), JSON.stringify(allLocal));
                    currentSermonId = docRef.id;
                } else { 
                    await setDoc(doc(sermonsColl, currentSermonId), fireData, { merge: true }); 
                }
            } catch (error) { 
                console.log("Aguardando conexão para sincronizar nuvem.");
            }
        };

        window.loadSingleSermon = function(id, data) {
            currentSermonId = id; 
            document.getElementById('sermon-title').value = data.title || ""; 
            const wrapper = document.getElementById('blocks-wrapper'); wrapper.innerHTML = '';
            
            if (data.blocks && data.blocks.length > 0) { data.blocks.forEach((block, index) => { wrapper.insertAdjacentHTML('beforeend', window.generateBlockHTML(block.header, block.estimated, block.content, index === 0)); }); } 
            else { window.addNewBlock(); }
            lucide.createIcons(); window.updateStickyHeaders(); window.tickClock();
            if (document.getElementById('sidebar').classList.contains('open')) window.toggleSidebar();
            window.loadSermonsList();
        };

        window.startNewSermon = function() {
            currentSermonId = null; 
            document.getElementById('sermon-title').value = ""; 
            const wrapper = document.getElementById('blocks-wrapper'); wrapper.innerHTML = '';
            window.addNewBlock(true);
            if (document.getElementById('sidebar').classList.contains('open')) window.toggleSidebar();
            window.loadSermonsList();
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user; 
                document.getElementById('displayUserEmail').innerText = user.email; 
                const letter = user.email.charAt(0).toUpperCase();
                document.getElementById('userAvatar').innerText = letter;
                document.getElementById('userAvatarDropdown').innerText = letter;

                authScreen.style.display = 'none'; mainHeader.style.display = 'flex'; appContainer.style.display = 'block'; errorMsg.innerText = '';
                
                window.loadSermonsList(); 
                if(!currentSermonId) window.startNewSermon(); 
                window.startAppLogic();
                window.loadThemePref();
            } else {
                currentUser = null; currentSermonId = null;
                authScreen.style.display = 'flex'; mainHeader.style.display = 'none'; appContainer.style.display = 'none';
                window.stopAppLogic();
            }
        });

        document.getElementById('btnLogin').addEventListener('click', () => { errorMsg.style.color = "#fca5a5"; signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(() => errorMsg.innerText = "Credenciais inválidas."); });
        document.getElementById('btnRegister').addEventListener('click', () => { errorMsg.style.color = "#fca5a5"; if (document.getElementById('password').value.length < 6) { errorMsg.innerText = "A senha exige mín. 6 caracteres."; return; } createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(() => errorMsg.innerText = "Erro ao registar. O e-mail pode já estar em uso."); });

        const performLogout = () => { signOut(auth); document.getElementById('userDropdown').classList.remove('show'); document.getElementById('email').value = ''; document.getElementById('password').value = ''; };
        document.getElementById('btnLogout').addEventListener('click', performLogout);
        document.getElementById('btnSwitchUser').addEventListener('click', performLogout);
    </script>

    <script>
        lucide.createIcons();
        
        // PWA Install
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('btnInstallPwa').style.display = 'flex';
        });

        document.getElementById('btnInstallPwa').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('btnInstallPwa').style.display = 'none';
                deferredPrompt = null;
            }
        });

        // Interface Menus
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        window.toggleSidebar = function() {
            if (sidebar.classList.contains('open')) { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('show'); } 
            else { sidebar.classList.add('open'); sidebarOverlay.classList.add('show'); }
        }
        document.getElementById('btnOpenSidebar').addEventListener('click', window.toggleSidebar);
        document.getElementById('btnCloseSidebar').addEventListener('click', window.toggleSidebar);
        sidebarOverlay.addEventListener('click', window.toggleSidebar);

        const userDropdown = document.getElementById('userDropdown');
        document.getElementById('btnUserMenu').addEventListener('click', (e) => { userDropdown.classList.toggle('show'); e.stopPropagation(); });
        document.addEventListener('click', (e) => { if(userDropdown.classList.contains('show') && !e.target.closest('.user-menu-wrapper')) { userDropdown.classList.remove('show'); } });

        // TEMA CLARO / ESCURO
        window.loadThemePref = function() {
            const savedTheme = localStorage.getItem('pregadores_theme');
            if (savedTheme === 'light') { document.documentElement.classList.add('light-mode'); document.getElementById('theme-icon').setAttribute('data-lucide', 'moon'); }
            else { document.documentElement.classList.remove('light-mode'); document.getElementById('theme-icon').setAttribute('data-lucide', 'sun'); }
            lucide.createIcons();
        }
        window.toggleTheme = function() {
            const isLight = document.documentElement.classList.contains('light-mode');
            if (isLight) { document.documentElement.classList.remove('light-mode'); localStorage.setItem('pregadores_theme', 'dark'); document.getElementById('theme-icon').setAttribute('data-lucide', 'sun'); }
            else { document.documentElement.classList.add('light-mode'); localStorage.setItem('pregadores_theme', 'light'); document.getElementById('theme-icon').setAttribute('data-lucide', 'moon'); }
            lucide.createIcons();
        }

        // LÓGICA DO APP
        let isEditMode = true; 
        let isTimersVisible = true;
        let masterClock = null;

        window.startAppLogic = function() { window.updateStickyHeaders(); window.updateTimeEstimates(); if (masterClock) clearInterval(masterClock); masterClock = setInterval(() => { window.tickClock(); }, 1000); };
        window.stopAppLogic = function() { if (masterClock) clearInterval(masterClock); masterClock = null; };

        // RELÓGIO E TEMPOS (Só Minutos Visualmente)
        window.tickClock = function() {
            // Relógio em tempo real do sistema
            document.getElementById('realTimeClock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            const activeHeader = document.querySelector('.accordion-header.active');
            if (activeHeader && activeHeader.getAttribute('data-state') === 'playing') {
                let elapsed = parseInt(activeHeader.getAttribute('data-elapsed') || '0'); 
                activeHeader.setAttribute('data-elapsed', elapsed + 1);
            }
            document.querySelectorAll('.accordion-header').forEach(header => window.renderBlockTimer(header));
            window.renderGlobalTimer();
        };

        window.controlTimer = function(btnElement, action) {
            const header = btnElement.closest('.accordion-header'); const panel = btnElement.closest('.timer-panel');
            const playBtn = panel.querySelector('[title="Iniciar/Continuar"]'); const pauseBtn = panel.querySelector('[title="Pausar"]');
            if (action === 'play') { header.setAttribute('data-state', 'playing'); playBtn.classList.add('active-play'); pauseBtn.classList.remove('active-pause'); } 
            else if (action === 'pause') { header.setAttribute('data-state', 'paused'); playBtn.classList.remove('active-play'); pauseBtn.classList.add('active-pause'); } 
            else if (action === 'reset') { header.setAttribute('data-elapsed', '0'); header.setAttribute('data-state', 'paused'); playBtn.classList.remove('active-play'); pauseBtn.classList.remove('active-pause'); }
            window.renderBlockTimer(header);
        };

        window.editTimer = function(btnElement) {
            const header = btnElement.closest('.accordion-header'); const currentEst = header.getAttribute('data-estimated') || '0';
            const newEst = prompt("Definir novo tempo estimado (em minutos):", currentEst);
            if (newEst !== null && newEst.trim() !== "" && !isNaN(newEst) && newEst > 0) {
                header.setAttribute('data-estimated', newEst); const body = header.closest('.accordion-item').querySelector('.time-input');
                if (body) body.value = newEst;
                window.renderBlockTimer(header); window.renderGlobalTimer();
            }
        };

        window.renderBlockTimer = function(header) {
            let elapsedSecs = parseInt(header.getAttribute('data-elapsed') || '0'); 
            let estimatedMins = parseInt(header.getAttribute('data-estimated') || '0');
            let timeDisplay = header.querySelector('.time-display'); 
            let progressBar = header.querySelector('.progress-bar-fill');
            
            if (estimatedMins > 0) {
                let remainingSecs = (estimatedMins * 60) - elapsedSecs; 
                let m = Math.ceil(Math.abs(remainingSecs) / 60); // Apenas Minutos Arredondados
                if(remainingSecs === 0) m = 0;

                if (remainingSecs === 60 && header.classList.contains('active')) { if(navigator.vibrate) navigator.vibrate(500); }
                if (remainingSecs === 0 && header.classList.contains('active')) { if(navigator.vibrate) navigator.vibrate([300, 200, 300, 200, 500]); }
                
                if (remainingSecs < 0) { 
                    timeDisplay.innerText = `-${m} min`; timeDisplay.classList.add('over-time'); 
                    if(progressBar) { progressBar.style.width = `100%`; progressBar.style.backgroundColor = 'var(--danger)'; progressBar.style.boxShadow = '0 0 15px var(--danger)';} 
                } else { 
                    timeDisplay.innerText = `${m} min`; timeDisplay.classList.remove('over-time'); 
                    if(progressBar) { let p = (elapsedSecs / (estimatedMins * 60)) * 100; progressBar.style.width = `${p}%`; 
                        if (p < 75) { progressBar.style.backgroundColor = 'var(--primary)'; progressBar.style.boxShadow = '0 0 10px var(--primary)';}
                        else if (p < 90) { progressBar.style.backgroundColor = 'var(--warning)'; progressBar.style.boxShadow = '0 0 10px var(--warning)';}
                        else { progressBar.style.backgroundColor = 'var(--danger)'; progressBar.style.boxShadow = '0 0 10px var(--danger)';}
                    } 
                }
            } else { timeDisplay.innerText = `-- min`; timeDisplay.classList.remove('over-time'); if(progressBar) progressBar.style.width = `0%`; }
        };

        window.renderGlobalTimer = function() {
            let tElapsed = 0; let tEstMins = 0; 
            document.querySelectorAll('.accordion-header').forEach(h => { tElapsed += parseInt(h.getAttribute('data-elapsed') || '0'); tEstMins += parseInt(h.getAttribute('data-estimated') || '0'); });
            let remainingSecs = (tEstMins * 60) - tElapsed; 
            let m = Math.ceil(Math.abs(remainingSecs) / 60);
            if(remainingSecs === 0) m = 0;

            const gDisp = document.getElementById('global-time-display');
            if (remainingSecs < 0) { gDisp.innerText = `-${m} min`; gDisp.parentElement.style.color = '#fca5a5'; gDisp.parentElement.style.borderColor = 'rgba(239, 68, 68, 0.3)'; gDisp.parentElement.style.background = 'rgba(239, 68, 68, 0.1)';} 
            else { gDisp.innerText = `${m} min`; gDisp.parentElement.style.color = 'var(--success)'; gDisp.parentElement.style.borderColor = 'rgba(16, 185, 129, 0.2)'; gDisp.parentElement.style.background = 'rgba(16, 185, 129, 0.1)';}
        };

        window.updateTimeEstimates = function() {
            document.querySelectorAll('.accordion-item').forEach(item => {
                const input = item.querySelector('.time-input'); const header = item.querySelector('.accordion-header');
                if (input && header) header.setAttribute('data-estimated', input.value || '0');
            }); window.tickClock();
        };

        // LÓGICA DA TELA ÚTIL (Cabeça atual no topo, cabeça seguinte no rodapé)
        window.updateStickyHeaders = function() {
            let activeFound = false;
            document.querySelectorAll('.accordion-header').forEach((header) => {
                header.classList.remove('sticky-top', 'sticky-bottom');
                if (header.classList.contains('active')) { 
                    activeFound = true; 
                    header.classList.add('sticky-top'); 
                } 
                else if (activeFound === true) { 
                    // Apenas a cabeça IMEDIATAMENTE seguinte é atraida pro rodapé para não sobrepor todas
                    header.classList.add('sticky-bottom'); 
                    activeFound = 'done'; 
                }
            });
        };

        window.toggleVisibilityTimers = function() {
            isTimersVisible = !isTimersVisible;
            if(!isTimersVisible) { document.body.classList.add('hide-timers'); document.getElementById('icon-timer-vis').setAttribute('data-lucide', 'eye'); }
            else { document.body.classList.remove('hide-timers'); document.getElementById('icon-timer-vis').setAttribute('data-lucide', 'eye-off'); }
            lucide.createIcons();
        };

        window.toggleAppMode = function() {
            isEditMode = !isEditMode; const body = document.body; const btn = document.getElementById('toggleModeBtn');
            if (isEditMode) { 
                body.classList.remove('view-mode'); body.classList.add('edit-mode'); 
                btn.innerHTML = '<i data-lucide="unlock" id="mode-icon" style="width: 18px;"></i> <span class="mode-text">Editando</span>'; btn.classList.remove('locked'); 
                document.querySelectorAll('.header-content, .editor-area').forEach(el => el.setAttribute('contenteditable', 'true')); 
                
                // NOVO: Resetar e pausar todos os relógios ao entrar no modo de Edição
                document.querySelectorAll('.accordion-header').forEach(h => {
                    h.setAttribute('data-elapsed', '0');
                    h.setAttribute('data-state', 'paused');
                    const p = h.querySelector('.timer-panel');
                    p.querySelector('[title="Iniciar/Continuar"]').classList.remove('active-play'); 
                    p.querySelector('[title="Pausar"]').classList.remove('active-pause');
                });
                window.tickClock();

            } else { 
                window.saveCurrentSermon(null, true); 
                body.classList.remove('edit-mode'); body.classList.add('view-mode'); 
                btn.innerHTML = '<i data-lucide="lock" id="mode-icon" style="width: 18px;"></i> <span class="mode-text">Leitura</span>'; btn.classList.add('locked'); 
                document.querySelectorAll('.header-content, .editor-area').forEach(el => el.setAttribute('contenteditable', 'false')); 
            }
            lucide.createIcons();
        };

        window.preventToggleIfEditing = function(event) { if (isEditMode) event.stopPropagation(); };

        window.toggleAccordion = function(clickedHeader) {
            const isActive = clickedHeader.classList.contains('active');
            const itemBody = clickedHeader.closest('.accordion-item').querySelector('.accordion-body');

            document.querySelectorAll('.accordion-header').forEach(h => {
                h.classList.remove('active'); h.setAttribute('data-state', 'paused');
                const p = h.querySelector('.timer-panel');
                p.querySelector('[title="Iniciar/Continuar"]').classList.remove('active-play'); p.querySelector('[title="Pausar"]').classList.remove('active-pause');
            });
            document.querySelectorAll('.accordion-body').forEach(b => b.classList.remove('active'));

            if (!isActive) {
                clickedHeader.classList.add('active'); itemBody.classList.add('active'); 
                clickedHeader.setAttribute('data-state', 'playing');
                clickedHeader.querySelector('[title="Iniciar/Continuar"]').classList.add('active-play');
                window.updateStickyHeaders(); window.tickClock();
                setTimeout(() => { window.scrollTo({top: clickedHeader.getBoundingClientRect().top + window.scrollY - document.querySelector('.main-header').offsetHeight - 20, behavior: 'smooth'}); }, 100); 
            } else { window.updateStickyHeaders(); }
        };

        window.formatText = function(command, value = null) { document.execCommand(command, false, value); };

        window.deleteBox = function(btn) { 
            if(confirm('Excluir este bloco de forma permanente?')) { 
                const item = btn.closest('.accordion-item');
                item.remove(); window.updateStickyHeaders(); window.tickClock(); 
            } 
        };

        window.generateBlockHTML = function(headerText = "", estimated = 5, contentText = "", isActive = false) {
            return `
                <div class="accordion-item">
                    <div class="accordion-header ${isActive ? 'active sticky-top' : ''}" onclick="window.toggleAccordion(this)" data-elapsed="0" data-estimated="${estimated}" data-state="${isActive ? 'playing' : 'paused'}">
                        <div class="progress-bar-container"><div class="progress-bar-fill"></div></div>
                        <div class="header-content" contenteditable="true" onclick="window.preventToggleIfEditing(event)">${headerText}</div>
                        <div class="timer-panel" onclick="event.stopPropagation();">
                            <button class="timer-btn ${isActive ? 'active-play' : ''}" onclick="window.controlTimer(this, 'play')" title="Iniciar/Continuar"><i data-lucide="play" style="width:16px;"></i></button>
                            <button class="timer-btn" onclick="window.controlTimer(this, 'pause')" title="Pausar"><i data-lucide="pause" style="width:16px;"></i></button>
                            <button class="timer-btn" onclick="window.controlTimer(this, 'reset')" title="Zerar Relógio"><i data-lucide="rotate-ccw" style="width:16px;"></i></button>
                            <button class="timer-btn" onclick="window.editTimer(this)" title="Editar Tempo"><i data-lucide="pencil" style="width:14px;"></i></button>
                            <span class="header-timer time-display">${estimated} min</span>
                        </div>
                        <div class="toggle-icon"><i data-lucide="chevron-down"></i></div>
                    </div>
                    <div class="accordion-body ${isActive ? 'active' : ''}">
                        <div class="time-settings"><label><i data-lucide="clock" style="width:18px;"></i> Estimativa (min):</label><input type="number" class="time-input" value="${estimated}" min="1" oninput="window.updateTimeEstimates()"></div>
                        <div class="toolbar">
                            <select onchange="window.formatText('fontName', this.value); this.selectedIndex=0;" class="format-select">
                                <option value="">Fonte</option>
                                <option value="Arial">Arial</option>
                                <option value="Georgia">Georgia</option>
                                <option value="Courier New">Courier</option>
                                <option value="Times New Roman">Times</option>
                            </select>
                            <select onchange="window.formatText('fontSize', this.value); this.selectedIndex=0;" class="format-select">
                                <option value="">Tam.</option>
                                <option value="1">Pequeno</option>
                                <option value="3">Normal</option>
                                <option value="5">Grande</option>
                                <option value="7">Gigante</option>
                            </select>
                            <span class="divider"></span>
                            <button type="button" onclick="window.formatText('bold')" title="Negrito"><i data-lucide="bold"></i></button>
                            <button type="button" onclick="window.formatText('italic')" title="Itálico"><i data-lucide="italic"></i></button>
                            <button type="button" onclick="window.formatText('underline')" title="Sublinhado"><i data-lucide="underline"></i></button>
                            <button type="button" onclick="window.formatText('strikeThrough')" title="Riscado"><i data-lucide="strikethrough"></i></button>
                            <span class="divider"></span>
                            <button type="button" onclick="window.formatText('justifyLeft')" title="Esquerda"><i data-lucide="align-left"></i></button>
                            <button type="button" onclick="window.formatText('justifyCenter')" title="Centro"><i data-lucide="align-center"></i></button>
                            <button type="button" onclick="window.formatText('justifyRight')" title="Direita"><i data-lucide="align-right"></i></button>
                            <span class="divider"></span>
                            <button type="button" onclick="window.formatText('insertUnorderedList')" title="Lista"><i data-lucide="list"></i></button>
                            <button type="button" onclick="window.formatText('insertOrderedList')" title="Numérica"><i data-lucide="list-ordered"></i></button>
                            <span class="divider"></span>
                            <button type="button" onclick="window.formatText('undo')" title="Desfazer"><i data-lucide="undo"></i></button>
                            <button type="button" onclick="window.formatText('redo')" title="Refazer"><i data-lucide="redo"></i></button>
                        </div>
                        <div class="editor-area" contenteditable="true">${contentText}</div>
                        <div class="box-actions">
                            <button class="btn-action btn-delete" onclick="window.deleteBox(this)"><i data-lucide="trash-2" style="width:18px;"></i> Excluir</button>
                            <button class="btn-action btn-save" onclick="window.saveCurrentSermon(this)"><i data-lucide="save" style="width:18px;"></i> Guardar no Aparelho</button>
                        </div>
                    </div>
                </div>`;
        };

        window.addNewBlock = function(isFirst = false) {
            if (!isEditMode) window.toggleAppMode();
            const wrapper = document.getElementById('blocks-wrapper'); if (!wrapper) return;
            const headerText = isFirst ? "1. Introdução\nO Início da Mensagem" : "";
            wrapper.insertAdjacentHTML('beforeend', window.generateBlockHTML(headerText, 5, "", true));
            lucide.createIcons(); 
            const headers = wrapper.querySelectorAll('.accordion-header'); const lastHeader = headers[headers.length - 1];
            if(!isFirst) { window.toggleAccordion(lastHeader); lastHeader.querySelector('.header-content').focus(); }
        };
    </script>
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            registration.onupdatefound = () => {
              const installingWorker = registration.installing;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log("Nova versão do app disponível! A atualizar...");
                  window.location.reload(true);
                }
              };
            };
          });
        });
      }
    </script>
</body>
</html>
