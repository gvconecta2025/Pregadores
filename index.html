<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Pregadores - Premium V10</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* PALETA PREMIUM DARK (Glassmorphism & Neon) */
        :root {
            --bg-gradient: radial-gradient(circle at 10% 0%, #1e1b4b 0%, #020617 100%);
            --glass-bg: rgba(30, 41, 59, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-glow: rgba(99, 102, 241, 0.5);
            --primary: #6366f1; /* Indigo vibrante */
            --primary-hover: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --main-header-height: 75px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* -------------------------------------------
           TELA DE LOGIN (ESTILO APPLE)
        ------------------------------------------- */
        #auth-screen {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            padding: 20px; box-sizing: border-box;
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            padding: 50px 40px; border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 100%; max-width: 420px; text-align: center; 
            border: 1px solid var(--glass-border);
        }

        .auth-card h2 { color: white; margin-top: 0; margin-bottom: 30px; font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px;}
        
        .auth-input {
            width: 100%; padding: 16px 20px; margin-bottom: 20px; 
            background: rgba(0,0,0,0.2); color: white;
            border: 1px solid var(--glass-border); border-radius: 12px; 
            font-size: 1.05rem; box-sizing: border-box; outline: none;
            transition: all 0.3s ease;
        }
        .auth-input:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--accent-glow); }
        .auth-input::placeholder { color: var(--text-muted); }

        .auth-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-bottom: 12px; transition: all 0.3s ease; }
        .btn-login { background-color: var(--primary); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
        .btn-login:hover { background-color: var(--primary-hover); transform: translateY(-2px); }
        .btn-register { background-color: transparent; color: white; border: 1px solid var(--glass-border); }
        .btn-register:hover { background: rgba(255,255,255,0.05); }
        
        .error-msg { color: #fca5a5; font-size: 0.95rem; margin-bottom: 20px; min-height: 20px; font-weight: 500; }

        #main-header, #app-container { display: none; }

        /* -------------------------------------------
           CABEÇALHO PRINCIPAL
        ------------------------------------------- */
        .main-header {
            background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            height: var(--main-header-height); padding: 0 24px; display: flex;
            justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--glass-border); box-sizing: border-box;
        }

        .header-title-group { display: flex; align-items: center; gap: 20px; }
        .main-header h1 { margin: 0; font-size: 1.4rem; color: white; font-weight: 800; letter-spacing: -0.5px; }

        .global-timer {
            background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 8px 16px;
            border-radius: 99px; font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; 
            border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
        }

        .header-actions { display: flex; gap: 12px; }
        .btn-toggle-mode { 
            background-color: var(--primary); color: white; border: none; padding: 10px 20px; 
            border-radius: 99px; font-weight: 600; font-size: 0.95rem; cursor: pointer; 
            display: flex; align-items: center; gap: 8px; transition: all 0.3s;
        }
        .btn-toggle-mode.locked { background-color: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--glass-border); }
        
        .btn-icon { background: transparent; color: var(--text-muted); border: 1px solid var(--glass-border); padding: 10px; border-radius: 50%; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center;}
        .btn-icon:hover { color: var(--danger); border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.1); }

        .container { width: 100%; margin: 0 auto; box-sizing: border-box; padding-top: 20px; }
        #blocks-wrapper { display: flex; flex-direction: column; gap: 20px; }

        /* -------------------------------------------
           CABEÇAS (Títulos & Cronômetro)
        ------------------------------------------- */
        .accordion-item {
            background: var(--glass-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .accordion-item.active {
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.4);
            background: rgba(30, 41, 59, 0.7);
        }

        .accordion-header {
            display: flex; align-items: center; padding: 20px 24px; cursor: pointer;
            position: relative;
        }

        .accordion-header.sticky-top { 
            position: sticky; top: var(--main-header-height); z-index: 90; 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .accordion-header.sticky-bottom { 
            position: sticky; bottom: 20px; z-index: 80; 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .progress-bar-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: rgba(0,0,0,0.3); }
        .progress-bar-fill { height: 100%; width: 0%; background-color: var(--primary); transition: width 1s linear, background-color 0.5s ease; box-shadow: 0 0 10px var(--primary); }

        .header-content { flex-grow: 1; font-size: 1.3rem; font-weight: 700; color: white; outline: none; min-height: 32px; white-space: pre-wrap; word-break: break-word; }
        .header-content:empty:before { content: "Digite o tópico aqui..."; color: rgba(255, 255, 255, 0.3); font-weight: 500; }

        /* PAINEL DO CRONÔMETRO APRIMORADO */
        .timer-panel {
            display: flex; align-items: center; gap: 8px; background: rgba(0, 0, 0, 0.3); 
            padding: 6px; border-radius: 99px; margin-right: 15px; border: 1px solid var(--glass-border);
        }
        
        .header-timer {
            font-size: 1.1rem; font-family: monospace; font-weight: 700; padding: 0 10px;
            color: var(--text-main);
        }
        .header-timer.over-time { color: #fca5a5; text-shadow: 0 0 10px var(--danger); animation: pulse 2s infinite; }

        .timer-btn {
            background: transparent; color: var(--text-muted); border: none; 
            display: flex; align-items: center; justify-content: center;
            padding: 6px; border-radius: 50%; cursor: pointer; transition: all 0.2s;
        }
        .timer-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .timer-btn.active-play { color: var(--success); }
        .timer-btn.active-pause { color: var(--warning); animation: pulse 1.5s infinite; }

        .toggle-icon { display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: transform 0.4s ease; }
        .accordion-item.active .toggle-icon { transform: rotate(180deg); color: var(--primary); }

        /* -------------------------------------------
           CORPO DA SANFONA & EDITOR
        ------------------------------------------- */
        .accordion-body { display: none; padding: 0 24px 24px 24px; }
        .accordion-item.active .accordion-body { display: block; animation: slideDown 0.4s ease; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .time-settings { 
            background: rgba(0,0,0,0.2); padding: 15px 20px; border-radius: 12px; margin-top: 15px; margin-bottom: 25px; 
            display: flex; align-items: center; gap: 15px; border: 1px solid var(--glass-border); 
        }
        .time-settings label { font-weight: 600; color: var(--text-muted); font-size: 0.95rem; display: flex; align-items: center; gap: 8px;}
        .time-settings input { 
            width: 80px; padding: 8px; background: rgba(255,255,255,0.05); color: white; 
            border: 1px solid var(--glass-border); border-radius: 8px; font-size: 1.1rem; text-align: center; outline: none; 
        }
        .time-settings input:focus { border-color: var(--primary); }

        /* BARRA DE FERRAMENTAS PROFISSIONAL */
        .toolbar {
            display: flex; gap: 6px; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 12px; 
            margin-bottom: 25px; border: 1px solid var(--glass-border);
        }
        .toolbar button {
            background: transparent; border: none; padding: 8px; border-radius: 8px; cursor: pointer; 
            color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .toolbar button:hover { background: rgba(255,255,255,0.1); color: white; }
        .toolbar .divider { width: 1px; background-color: var(--glass-border); margin: 0 6px; }

        .editor-area { outline: none; line-height: 1.8; font-size: 1.2rem; color: rgba(255,255,255,0.9); padding: 10px 0; min-height: 200px; }
        .editor-area:empty:before { content: "Desenvolva seu raciocínio aqui..."; color: rgba(255,255,255,0.2); }

        .box-actions { display: flex; justify-content: flex-end; gap: 15px; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--glass-border); }
        .btn-action { padding: 12px 24px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s;}
        .btn-save { background-color: var(--primary); color: white; }
        .btn-save:hover { background-color: var(--primary-hover); box-shadow: 0 0 15px var(--accent-glow); }
        .btn-delete { background-color: transparent; color: #fca5a5; }
        .btn-delete:hover { background: rgba(239, 68, 68, 0.1); }

        .btn-add {
            display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 24px; 
            background: var(--glass-bg); color: var(--text-muted); border: 1px dashed var(--glass-border); 
            border-radius: 20px; font-size: 1.15rem; font-weight: 600; cursor: pointer; margin-top: 20px; margin-bottom: 80px; transition: all 0.3s;
        }
        .btn-add:hover { background: rgba(255,255,255,0.05); border-color: var(--primary); color: white; box-shadow: 0 0 20px rgba(99,102,241,0.1); }

        body.view-mode .toolbar, body.view-mode .box-actions, body.view-mode .btn-add, body.view-mode .time-settings { display: none !important; }

        /* RESPONSIVIDADE AVANÇADA */
        @media (max-width: 767px) {
            .container { padding: 10px; max-width: 100%; }
            .toolbar { overflow-x: auto; flex-wrap: nowrap; }
            .toolbar::-webkit-scrollbar { display: none; }
            .header-title-group h1 { display: none; }
            .timer-panel { margin-right: 5px; }
            .accordion-header { padding: 15px; }
        }
        @media (min-width: 768px) and (max-width: 1023px) {
            .container { padding: 30px; max-width: 90%; }
            .toolbar { flex-wrap: wrap; }
        }
        @media (min-width: 1024px) {
            .container { padding: 40px; max-width: 900px; }
            .toolbar { position: sticky; top: calc(var(--main-header-height) + 80px); z-index: 85; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        }
    </style>
</head>
<body class="edit-mode">

    <div id="auth-screen">
        <div class="auth-card">
            <i data-lucide="book-open" style="color: var(--primary); width: 48px; height: 48px; margin-bottom: 20px;"></i>
            <h2>Esboço Seguro</h2>
            <div id="auth-error" class="error-msg"></div>
            <input type="email" id="email" class="auth-input" placeholder="Seu E-mail" required>
            <input type="password" id="password" class="auth-input" placeholder="Sua Senha (mín. 6 caracteres)" required>
            <button id="btnLogin" class="auth-btn btn-login">Acessar Púlpito</button>
            <button id="btnRegister" class="auth-btn btn-register">Criar Conta Segura</button>
        </div>
    </div>

    <header class="main-header" id="main-header">
        <div class="header-title-group">
            <i data-lucide="book-open" style="color: var(--primary);"></i>
            <h1>App Pregador</h1>
            <div class="global-timer" title="Tempo total restante">
                <i data-lucide="hourglass" style="width: 16px;"></i>
                <span id="global-time-display">00:00</span>
            </div>
        </div>
        <div class="header-actions">
            <button id="toggleModeBtn" class="btn-toggle-mode" onclick="toggleAppMode()">
                <i data-lucide="unlock" id="mode-icon" style="width: 18px;"></i> Editando
            </button>
            <button id="btnLogout" class="btn-icon" title="Sair da Conta">
                <i data-lucide="log-out" style="width: 20px;"></i>
            </button>
        </div>
    </header>

    <div class="container" id="app-container">
        <div id="blocks-wrapper">
            
            <div class="accordion-item active">
                <div class="accordion-header sticky-top" onclick="toggleAccordion(this)" data-elapsed="0" data-estimated="5" data-state="playing">
                    <div class="progress-bar-container"><div class="progress-bar-fill"></div></div>
                    <div class="header-content" contenteditable="true" onclick="preventToggleIfEditing(event)">1. Introdução
O Início da Mensagem</div>
                    
                    <div class="timer-panel" onclick="event.stopPropagation();">
                        <button class="timer-btn active-play" onclick="controlTimer(this, 'play')" title="Iniciar/Continuar"><i data-lucide="play" style="width:16px;"></i></button>
                        <button class="timer-btn" onclick="controlTimer(this, 'pause')" title="Pausar"><i data-lucide="pause" style="width:16px;"></i></button>
                        <button class="timer-btn" onclick="controlTimer(this, 'reset')" title="Zerar Relógio"><i data-lucide="rotate-ccw" style="width:16px;"></i></button>
                        <span class="header-timer time-display">05:00</span>
                    </div>

                    <div class="toggle-icon"><i data-lucide="chevron-down"></i></div>
                </div>
                
                <div class="accordion-body">

                    </div>
                    
                    <div class="toolbar">
                        <button type="button" onclick="formatText('bold')" title="Negrito"><i data-lucide="bold"></i></button>
                        <button type="button" onclick="formatText('italic')" title="Itálico"><i data-lucide="italic"></i></button>
                        <button type="button" onclick="formatText('underline')" title="Sublinhado"><i data-lucide="underline"></i></button>
                        <button type="button" onclick="formatText('strikeThrough')" title="Riscado"><i data-lucide="strikethrough"></i></button>
                        <span class="divider"></span>
                        <button type="button" onclick="formatText('justifyLeft')" title="Esquerda"><i data-lucide="align-left"></i></button>
                        <button type="button" onclick="formatText('justifyCenter')" title="Centro"><i data-lucide="align-center"></i></button>
                        <button type="button" onclick="formatText('justifyRight')" title="Direita"><i data-lucide="align-right"></i></button>
                        <span class="divider"></span>
                        <button type="button" onclick="formatText('insertUnorderedList')" title="Lista"><i data-lucide="list"></i></button>
                        <button type="button" onclick="formatText('insertOrderedList')" title="Numérica"><i data-lucide="list-ordered"></i></button>
                        <span class="divider"></span>
                        <button type="button" onclick="formatText('undo')" title="Desfazer"><i data-lucide="undo"></i></button>

                    <div class="editor-area" contenteditable="true">Escreva sua mensagem com clareza...</div>
                    
                    <div class="box-actions">
                        <button class="btn-action btn-delete" onclick="deleteBox(this)"><i data-lucide="trash-2" style="width:18px;"></i> Excluir</button>
                        <button class="btn-action btn-save" onclick="saveBox(this)"><i data-lucide="save" style="width:18px;"></i> Salvar Etapa</button>
                    </div>
                </div>
            </div>

        </div>
        <button class="btn-add" onclick="addNewBlock()"><i data-lucide="plus-circle"></i> Adicionar Novo Tópico</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDthpfYhfEWo_owFkHEPBd8ThKuPGstUoY",
            authDomain: "pregadores-6c330.firebaseapp.com",
            projectId: "pregadores-6c330",
            storageBucket: "pregadores-6c330.firebasestorage.app",
            messagingSenderId: "918085682020",
            appId: "1:918085682020:web:fe7861fe330068d1a73071",
            measurementId: "G-FZLWTMHQ83"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const authScreen = document.getElementById('auth-screen');
        const mainHeader = document.getElementById('main-header');
        const appContainer = document.getElementById('app-container');
        const errorMsg = document.getElementById('auth-error');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authScreen.style.display = 'none'; mainHeader.style.display = 'flex'; appContainer.style.display = 'block'; errorMsg.innerText = '';
                window.startAppLogic();
            } else {
                authScreen.style.display = 'flex'; mainHeader.style.display = 'none'; appContainer.style.display = 'none';
                window.stopAppLogic();
            }
        });

        document.getElementById('btnLogin').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
                .catch(() => errorMsg.innerText = "Credenciais inválidas.");
        });

        document.getElementById('btnRegister').addEventListener('click', () => {
            if (document.getElementById('password').value.length < 6) { errorMsg.innerText = "A senha exige mín. 6 caracteres."; return; }
            createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
                .catch(() => errorMsg.innerText = "Erro ao registrar. E-mail pode estar em uso.");
        });

        document.getElementById('btnLogout').addEventListener('click', () => { signOut(auth); });
    </script>

    <script>
        // Renderiza os ícones maravilhosos do Lucide
        lucide.createIcons();

        let isEditMode = true; 
        let masterClock = null;

        window.startAppLogic = function() { 
            updateStickyHeaders(); updateTimeEstimates(); 
            if (masterClock) clearInterval(masterClock); 
            masterClock = setInterval(() => { tickClock(); }, 1000); 
        };
        
        window.stopAppLogic = function() { 
            if (masterClock) clearInterval(masterClock); masterClock = null; 
        };

        function tickClock() {
            const activeItem = document.querySelector('.accordion-item.active');
            if (activeItem) {
                const header = activeItem.querySelector('.accordion-header');
                if (header.getAttribute('data-state') === 'playing') {
                    let elapsed = parseInt(header.getAttribute('data-elapsed') || '0'); 
                    header.setAttribute('data-elapsed', elapsed + 1);
                }
                renderBlockTimer(header);
            }
            document.querySelectorAll('.accordion-item:not(.active) .accordion-header').forEach(header => renderBlockTimer(header));
            renderGlobalTimer();
        }

        // NOVO: Controle de Mídia (Play, Pause, Reset)
        window.controlTimer = function(btnElement, action) {
            const header = btnElement.closest('.accordion-header');
            const panel = btnElement.closest('.timer-panel');
            const playBtn = panel.querySelector('[title="Iniciar/Continuar"]');
            const pauseBtn = panel.querySelector('[title="Pausar"]');

            if (action === 'play') {
                header.setAttribute('data-state', 'playing');
                playBtn.classList.add('active-play');
                pauseBtn.classList.remove('active-pause');
            } else if (action === 'pause') {
                header.setAttribute('data-state', 'paused');
                playBtn.classList.remove('active-play');
                pauseBtn.classList.add('active-pause');
            } else if (action === 'reset') {
                header.setAttribute('data-elapsed', '0');
                header.setAttribute('data-state', 'paused');
                playBtn.classList.remove('active-play');
                pauseBtn.classList.remove('active-pause');
            }
            renderBlockTimer(header);
        };

        function renderBlockTimer(header) {
            let elapsed = parseInt(header.getAttribute('data-elapsed') || '0'); 
            let estimatedMins = parseInt(header.getAttribute('data-estimated') || '0');
            let timeDisplay = header.querySelector('.time-display'); 
            let progressBar = header.querySelector('.progress-bar-fill');
            
            if (estimatedMins > 0) {
                let remaining = (estimatedMins * 60) - elapsed; 
                let absRemaining = Math.abs(remaining);
                let m = Math.floor(absRemaining / 60).toString().padStart(2, '0'); 
                let s = (absRemaining % 60).toString().padStart(2, '0');
                
                // NOVO: FEEDBACK TÁTIL (Vibra celular)
                if (remaining === 60 && header.parentElement.classList.contains('active')) {
                    if(navigator.vibrate) navigator.vibrate(500); // Faltam 1 min
                }
                if (remaining === 0 && header.parentElement.classList.contains('active')) {
                    if(navigator.vibrate) navigator.vibrate([300, 200, 300, 200, 500]); // Acabou
                }

                if (remaining < 0) { 
                    timeDisplay.innerText = `-${m}:${s}`; 
                    timeDisplay.classList.add('over-time'); 
                    if(progressBar) { progressBar.style.width = `100%`; progressBar.style.backgroundColor = 'var(--danger)'; progressBar.style.boxShadow = '0 0 15px var(--danger)';} 
                } else { 
                    timeDisplay.innerText = `${m}:${s}`; 
                    timeDisplay.classList.remove('over-time'); 
                    if(progressBar) { 
                        let p = (elapsed / (estimatedMins * 60)) * 100; 
                        progressBar.style.width = `${p}%`; 
                        if (p < 75) { progressBar.style.backgroundColor = 'var(--primary)'; progressBar.style.boxShadow = '0 0 10px var(--primary)';}
                        else if (p < 90) { progressBar.style.backgroundColor = 'var(--warning)'; progressBar.style.boxShadow = '0 0 10px var(--warning)';}
                        else { progressBar.style.backgroundColor = 'var(--danger)'; progressBar.style.boxShadow = '0 0 10px var(--danger)';}
                    } 
                }
            } else { 
                timeDisplay.innerText = `--:--`; timeDisplay.classList.remove('over-time'); 
                if(progressBar) progressBar.style.width = `0%`; 
            }
        }

        function renderGlobalTimer() {
            let tElapsed = 0; let tEstMins = 0; 
            document.querySelectorAll('.accordion-header').forEach(h => { 
                tElapsed += parseInt(h.getAttribute('data-elapsed') || '0'); 
                tEstMins += parseInt(h.getAttribute('data-estimated') || '0'); 
            });
            let remaining = (tEstMins * 60) - tElapsed; let absR = Math.abs(remaining);
            let m = Math.floor(absR / 60).toString().padStart(2, '0'); let s = (absR % 60).toString().padStart(2, '0');
            const gDisp = document.getElementById('global-time-display');
            if (remaining < 0) { gDisp.innerText = `-${m}:${s}`; gDisp.parentElement.style.color = '#fca5a5'; gDisp.parentElement.style.borderColor = 'rgba(239, 68, 68, 0.3)'; gDisp.parentElement.style.background = 'rgba(239, 68, 68, 0.1)';} 
            else { gDisp.innerText = `${m}:${s}`; gDisp.parentElement.style.color = 'var(--success)'; gDisp.parentElement.style.borderColor = 'rgba(16, 185, 129, 0.2)'; gDisp.parentElement.style.background = 'rgba(16, 185, 129, 0.1)';}
        }

        window.updateTimeEstimates = function() {
            document.querySelectorAll('.accordion-body').forEach(body => {
                const input = body.querySelector('.time-input'); 
                const header = body.parentElement.querySelector('.accordion-header');
                if (input && header) header.setAttribute('data-estimated', input.value || '0');
            }); tickClock();
        };

        function updateStickyHeaders() {
            let activeFound = false;
            document.querySelectorAll('.accordion-header').forEach((header) => {
                header.classList.remove('sticky-top', 'sticky-bottom');
                if (header.parentElement.classList.contains('active')) { activeFound = true; header.classList.add('sticky-top'); } 
                else if (activeFound) { header.classList.add('sticky-bottom'); activeFound = false; }
            });
        }

        window.toggleAppMode = function() {
            isEditMode = !isEditMode; const body = document.body; const btn = document.getElementById('toggleModeBtn');
            const icon = document.getElementById('mode-icon');
            if (isEditMode) { 
                body.classList.remove('view-mode'); body.classList.add('edit-mode'); 
                btn.innerHTML = '<i data-lucide="unlock" style="width: 18px;"></i> Editando'; btn.classList.remove('locked'); 
                document.querySelectorAll('.header-content, .editor-area').forEach(el => el.setAttribute('contenteditable', 'true')); 
            } else { 
                body.classList.remove('edit-mode'); body.classList.add('view-mode'); 
                btn.innerHTML = '<i data-lucide="lock" style="width: 18px;"></i> Leitura'; btn.classList.add('locked'); 
                document.querySelectorAll('.header-content, .editor-area').forEach(el => el.setAttribute('contenteditable', 'false')); 
            }
            lucide.createIcons();
        };

        window.preventToggleIfEditing = function(event) { if (isEditMode) event.stopPropagation(); };

        window.toggleAccordion = function(clickedHeader) {
            const item = clickedHeader.parentElement;
            const isActive = item.classList.contains('active');
            
            // Pausa todos
            document.querySelectorAll('.accordion-header').forEach(h => {
                h.setAttribute('data-state', 'paused');
                const p = h.querySelector('.timer-panel');
                p.querySelector('[title="Iniciar/Continuar"]').classList.remove('active-play');
                p.querySelector('[title="Pausar"]').classList.remove('active-pause');
            });
            document.querySelectorAll('.accordion-item').forEach(i => i.classList.remove('active'));

            if (!isActive) {
                item.classList.add('active'); 
                clickedHeader.setAttribute('data-state', 'playing');
                clickedHeader.querySelector('[title="Iniciar/Continuar"]').classList.add('active-play');
                
                updateStickyHeaders(); tickClock();
                setTimeout(() => { window.scrollTo({top: clickedHeader.getBoundingClientRect().top + window.scrollY - document.querySelector('.main-header').offsetHeight - 20, behavior: 'smooth'}); }, 100); 
            } else { updateStickyHeaders(); }
        };

        window.formatText = function(command) { document.execCommand(command, false, null); };

        window.deleteBox = function(btn) { 
            if(confirm('Excluir este bloco de forma permanente?')) { 
                btn.closest('.accordion-item').remove(); updateStickyHeaders(); tickClock(); 
            } 
        };

        window.saveBox = function(btn) { 
            const t = btn.innerHTML; 
            btn.innerHTML = '<i data-lucide="check" style="width:18px;"></i> Salvo!'; 
            btn.style.backgroundColor = 'var(--success)'; lucide.createIcons();
            setTimeout(() => { btn.innerHTML = t; btn.style.backgroundColor = 'var(--primary)'; lucide.createIcons();}, 2000); 
        };

        window.addNewBlock = function() {
            if (!isEditMode) toggleAppMode();
            const wrapper = document.getElementById('blocks-wrapper'); if (!wrapper) return;
            const HTML = `
                <div class="accordion-item">
                    <div class="accordion-header" onclick="toggleAccordion(this)" data-elapsed="0" data-estimated="10" data-state="paused">
                        <div class="progress-bar-container"><div class="progress-bar-fill"></div></div>
                        <div class="header-content" contenteditable="true" onclick="preventToggleIfEditing(event)"></div>
                        <div class="timer-panel" onclick="event.stopPropagation();">
                            <button class="timer-btn" onclick="controlTimer(this, 'play')" title="Iniciar/Continuar"><i data-lucide="play" style="width:16px;"></i></button>
                            <button class="timer-btn" onclick="controlTimer(this, 'pause')" title="Pausar"><i data-lucide="pause" style="width:16px;"></i></button>
                            <button class="timer-btn" onclick="controlTimer(this, 'reset')" title="Zerar Relógio"><i data-lucide="rotate-ccw" style="width:16px;"></i></button>
                            <span class="header-timer time-display">10:00</span>
                        </div>
                        <div class="toggle-icon"><i data-lucide="chevron-down"></i></div>
                    </div>
                    <div class="accordion-body">
                        <div class="time-settings"><label><i data-lucide="clock" style="width:18px;"></i> Estimativa (min):</label><input type="number" class="time-input" value="10" min="1" oninput="updateTimeEstimates()"></div>
                        <div class="toolbar">
                            <button type="button" onclick="formatText('bold')" title="Negrito"><i data-lucide="bold"></i></button>
                            <button type="button" onclick="formatText('italic')" title="Itálico"><i data-lucide="italic"></i></button>
                            <button type="button" onclick="formatText('underline')" title="Sublinhado"><i data-lucide="underline"></i></button>
                            <button type="button" onclick="formatText('strikeThrough')" title="Riscado"><i data-lucide="strikethrough"></i></button>
                            <span class="divider"></span>
                            <button type="button" onclick="formatText('justifyLeft')" title="Esquerda"><i data-lucide="align-left"></i></button>
                            <button type="button" onclick="formatText('justifyCenter')" title="Centro"><i data-lucide="align-center"></i></button>
                            <button type="button" onclick="formatText('justifyRight')" title="Direita"><i data-lucide="align-right"></i></button>
                            <span class="divider"></span>
                            <button type="button" onclick="formatText('insertUnorderedList')" title="Lista"><i data-lucide="list"></i></button>
                            <button type="button" onclick="formatText('insertOrderedList')" title="Numérica"><i data-lucide="list-ordered"></i></button>
                            <span class="divider"></span>
                            <button type="button" onclick="formatText('undo')" title="Desfazer"><i data-lucide="undo"></i></button>
                            <button type="button" onclick="formatText('redo')" title="Refazer"><i data-lucide="redo"></i></button>
                        </div>
                        <div class="editor-area" contenteditable="true"></div>
                        <div class="box-actions"><button class="btn-action btn-delete" onclick="deleteBox(this)"><i data-lucide="trash-2" style="width:18px;"></i> Excluir</button><button class="btn-action btn-save" onclick="saveBox(this)"><i data-lucide="save" style="width:18px;"></i> Salvar Etapa</button></div>
                    </div>
                </div>`;
            wrapper.insertAdjacentHTML('beforeend', HTML);
            lucide.createIcons(); // Atualiza icones do novo bloco
            const items = wrapper.querySelectorAll('.accordion-item'); 
            const lastHeader = items[items.length - 1].querySelector('.accordion-header');
            toggleAccordion(lastHeader); lastHeader.querySelector('.header-content').focus();
        };
    </script>
</body>
</html>
